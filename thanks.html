<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Thank You — Naman Jha</title>
  <meta http-equiv="refresh" content="6;url=https://naman1803.github.io/personalwebsite/">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/js/all.min.js" defer></script>

  <style>
    :root {
      --bg: #080C10;
      --bg2: #0D1117;
      --surface: #131C26;
      --border: rgba(255,255,255,0.07);
      --accent: #00C896;
      --text: #E8EDF2;
      --text2: #9BAAB8;
      --text3: #5C6E82;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,200,150,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,200,150,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black 30%, transparent 100%);
      pointer-events: none;
    }

    /* Glow */
    body::after {
      content: '';
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 600px; height: 400px;
      background: radial-gradient(ellipse, rgba(0,200,150,0.1) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid rgba(0,200,150,0.2);
      border-radius: 20px;
      padding: 3rem 3.5rem;
      max-width: 520px;
      width: 100%;
      text-align: center;
      box-shadow: 0 30px 80px rgba(0,0,0,0.4), 0 0 60px rgba(0,200,150,0.06);
      animation: fadeUp 0.7s cubic-bezier(0.4,0,0.2,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .check-circle {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: rgba(0,200,150,0.12);
      border: 2px solid rgba(0,200,150,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.8rem;
      font-size: 2rem;
      color: var(--accent);
      animation: popIn 0.5s 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    @keyframes popIn {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 0.8rem;
    }

    h1 span {
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      background-image: linear-gradient(135deg, var(--accent) 0%, #5FFFCC 100%);
    }

    .sub {
      color: var(--text2);
      font-size: 1rem;
      font-weight: 300;
      line-height: 1.7;
      margin-bottom: 2rem;
    }

    /* Progress bar */
    .progress-wrap {
      margin-bottom: 2rem;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.78rem;
      color: var(--text3);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    #countdown-num { color: var(--accent); font-weight: 600; }

    .progress-bar-track {
      height: 3px;
      background: rgba(255,255,255,0.07);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #5FFFCC);
      border-radius: 2px;
      width: 0%;
      transition: width 0.25s linear;
      box-shadow: 0 0 8px rgba(0,200,150,0.6);
    }

    .home-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background: var(--accent);
      color: var(--bg);
      padding: 0.85rem 2rem;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
      box-shadow: 0 4px 20px rgba(0,200,150,0.25);
      margin-bottom: 1.5rem;
    }

    .home-btn:hover {
      background: #00A37A;
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0,200,150,0.35);
    }

    .socials {
      display: flex;
      justify-content: center;
      gap: 0.8rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }

    .socials a {
      width: 38px; height: 38px;
      border-radius: 8px;
      background: var(--bg2);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text2);
      font-size: 0.88rem;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .socials a:hover {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    /* Logo top */
    .top-logo {
      position: fixed;
      top: 1.5rem; left: 2rem;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.1rem;
      color: var(--text);
      text-decoration: none;
      z-index: 10;
    }

    .top-logo span { color: var(--accent); }

    @media (max-width: 600px) {
      .card { padding: 2rem 1.5rem; }
      h1 { font-size: 1.8rem; }
    }
  </style>
</head>
<body>

  <a href="https://naman1803.github.io/personalwebsite/" class="top-logo">NJ<span>.</span></a>

  <div class="card">
    <div class="check-circle">
      <i class="fas fa-check"></i>
    </div>

    <h1>Message <span>Sent!</span></h1>
    <p class="sub">
      Thanks for reaching out. I've received your message and will get back to you as soon as possible.
    </p>

    <div class="progress-wrap">
      <div class="progress-label">
        <span>Redirecting to homepage</span>
        <span><span id="countdown-num">6</span>s</span>
      </div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
    </div>

    <a href="https://naman1803.github.io/personalwebsite/" class="home-btn">
      <i class="fas fa-arrow-left"></i> Back to Portfolio
    </a>

    <div class="socials">
      <a href="https://linkedin.com/in/naman18jha" target="_blank" title="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
      <a href="https://github.com/naman1803" target="_blank" title="GitHub"><i class="fab fa-github"></i></a>
      <a href="mailto:naman3231@outlook.com" title="Email"><i class="fas fa-envelope"></i></a>
    </div>
  </div>

  <script>
    const total = 6000;
    const fill = document.getElementById('progressFill');
    const num  = document.getElementById('countdown-num');
    let elapsed = 0;
    const interval = setInterval(() => {
      elapsed += 250;
      const pct = Math.min((elapsed / total) * 100, 100);
      fill.style.width = pct + '%';
      const secs = Math.max(0, Math.ceil((total - elapsed) / 1000));
      num.textContent = secs;
      if (elapsed >= total) {
        clearInterval(interval);
        window.location.href = 'https://naman1803.github.io/personalwebsite/';
      }
    }, 250);
  </script>
</body>
</html>
